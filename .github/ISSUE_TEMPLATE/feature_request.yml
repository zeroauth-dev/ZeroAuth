name: Feature request
description: Suggest a new capability or improvement.
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        For broader proposals, consider opening a
        [discussion](https://github.com/zeroauth-dev/ZeroAuth/discussions)
        first so we can align on scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Today, when I … I cannot …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Add an endpoint / option / scope that …
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ZKP biometric flow
        - SAML
        - OIDC / OAuth 2.0
        - Developer console
        - Admin / observability
        - Smart contracts
        - Documentation
        - Other
    validations:
      required: true
