name: Bug report
description: Report a reproducible bug.
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. **Security
        vulnerabilities should not be reported here** — see [SECURITY.md](https://github.com/pulkitpareek18/ZeroAuth/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I POST to /v1/auth/zkp/verify with…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign up via /api/console/signup
        2. POST /v1/auth/zkp/verify with payload …
        3. Observe …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ZeroAuth version / commit
      placeholder: 'e.g. v2.0.0 or commit hash'
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Hosted (zeroauth.dev)
        - Self-hosted (Docker compose)
        - Self-hosted (Node.js, no Docker)
        - Local development
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. Redact secrets.
      render: shell
